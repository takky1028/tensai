name: X User Monitor

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: x_watch_monitor
    env:
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      DISCORD_WEBHOOK_URL_DEFAULT: ${{ secrets.DISCORD_WEBHOOK_URL_DEFAULT }}
      DATABASE_PATH: data/monitor.db
      CONFIG_PATH: config/targets.yaml
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run monitor
        run: python -m x_watch_monitor.jobs.poll_targets

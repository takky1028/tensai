targets:
  - target_id: trump-topic-watch
    display_name: "トランプ・米国政策トピック監視"
    keywords:
      - "FRB"
      - "トランプ"
      - "アメリカ大統領"
      - "米大統領"
      - "関税"
      - "戦争"
    enabled: true
    poll_interval_minutes: 240
    max_items: 20
    x_search_enabled: true
    news_enabled: true
    analysis_profile: "macro_policy"
    discord_webhook_url: "${DISCORD_WEBHOOK_URL_DEFAULT}"
